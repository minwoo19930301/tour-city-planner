<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting</title>
    <script>
        const target = `./index.html${window.location.search}${window.location.hash}`;
        window.location.replace(target);
    </script>
</head>

<body>
    <p>Redirecting to <a id="redirect-link" href="./index.html">trip plans</a>...</p>
    <script>
        document.getElementById('redirect-link').setAttribute('href', `./index.html${window.location.search}${window.location.hash}`);
    </script>
</body>

</html>
